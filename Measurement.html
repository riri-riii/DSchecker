<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検証記録 - wlwDS計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="wlwMeasurement.css">
</head>
<body>
<div class="container">

<h2>検証記録</h2>

<div class="nav-link">
  <a href="index.html">← DS値計算機に戻る</a>
</div>

<!-- ブロック1: 検証設定 -->
<section class="card">
  <h3>検証設定</h3>
  <div class="search-container">

    <!-- 1段目: 検証アシスト名 -->
    <div class="search-row">
      <div class="box box-full">
        <input type="text" id="measureAssistName" placeholder="検証アシスト名（直打ち）">
      </div>
    </div>

    <!-- 2段目: キャスト選択・アシスト1・アシスト2 -->
    <div class="search-row">
      <div class="box">
        <select id="castSelect">
          <option value="">キャスト選択</option>
        </select>
      </div>
      <div class="box">
        <input type="text" id="search1" placeholder="アシスト1">
        <div class="suggestions" id="sug1"></div>
      </div>
      <div class="box">
        <input type="text" id="search2" placeholder="アシスト2">
        <div class="suggestions" id="sug2"></div>
      </div>
    </div>

    <!-- 3段目: アシスト3・アシスト4・ソウル -->
    <div class="search-row">
      <div class="box">
        <input type="text" id="search3" placeholder="アシスト3">
        <div class="suggestions" id="sug3"></div>
      </div>
      <div class="box">
        <input type="text" id="search4" placeholder="アシスト4">
        <div class="suggestions" id="sug4"></div>
      </div>
      <div class="box">
        <input type="text" id="search5" placeholder="ソウル">
        <div class="suggestions" id="sug5"></div>
      </div>
    </div>

    <!-- 4段目: 記録・クリアボタン -->
    <div class="search-row search-row-right">
      <div class="box box-btn">
        <button id="recordButton">記録</button>
      </div>
      <div class="box box-btn">
        <button id="clearButton" class="btn-secondary">クリア</button>
      </div>
    </div>

  </div>
</section>

<!-- ブロック2: 検証データ表（5列×8行） -->
<section class="card">
  <h3>検証データ</h3>
  <div class="table-wrapper">
    <table id="measureTable">
      <thead>
        <tr>
          <th>CB</th>
          <th>レベル</th>
          <th>DS値</th>
          <th>1確残</th>
          <th>結果</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>1</td>
          <td id="mds1">0.00</td>
          <td id="mjudge1">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>2</td>
          <td id="mds2">0.00</td>
          <td id="mjudge2">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>3</td>
          <td id="mds3">0.00</td>
          <td id="mjudge3">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>4</td>
          <td id="mds4">0.00</td>
          <td id="mjudge4">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>5</td>
          <td id="mds5">0.00</td>
          <td id="mjudge5">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>6</td>
          <td id="mds6">0.00</td>
          <td id="mjudge6">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>7</td>
          <td id="mds7">0.00</td>
          <td id="mjudge7">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
        <tr>
          <td><input type="checkbox" class="cb-check"></td>
          <td>8</td>
          <td id="mds8">0.00</td>
          <td id="mjudge8">-</td>
          <td><input type="checkbox" class="result-check"></td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<!-- ブロック3: 検証ログ -->
<section class="card">
  <h3>検証ログ</h3>
  <div id="logDisplay"></div>
</section>

<div class="nav-link bottom">
  <a href="index.html">← DS値計算機に戻る</a>
</div>

<!-- 記録確認モーダル -->
<div id="recordModal" class="modal-overlay">
  <div class="modal">
    <h3>検証結果を保存</h3>
    <p>現在の検証結果を保存しますか？</p>
    <div class="modal-field">
      <label for="notesInput">補足情報（任意）</label>
      <textarea id="notesInput" placeholder="補足情報を入力..." rows="3"></textarea>
    </div>
    <div class="modal-buttons">
      <button id="modalOk">OK</button>
      <button id="modalCancel" class="btn-secondary">キャンセル</button>
    </div>
  </div>
</div>

<script src="wlwMeasurement.js"></script>
</div>
</body>
</html>
